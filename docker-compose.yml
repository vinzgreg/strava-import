services:
  sports-dashboard:
    build: .
    container_name: sports-dashboard
    restart: unless-stopped
    ports:
      - "5050:5000"   # reachable on all interfaces; restrict with ufw (see below)
    volumes:
      - /home/vinz/data/garminnostra/garmin_nostra.db:/data/garmin_nostra.db:ro
    environment:
      - DB_PATH=/data/garmin_nostra.db
      - TZ=Europe/Berlin
